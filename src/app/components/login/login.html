<div class="lg-wrapper">

  <div class="lg-card">

    <!-- LOGO -->
    <div class="lg-logo">
      <img
        src="/assets/images/logo.png"
        alt="Logo Hotel"
        class="lg-logo-img">
    </div>

    <!-- TÍTULO -->
    <h2 class="lg-title">Iniciar sesión</h2>

    <p class="lg-subtitle">
      Ingresa tus credenciales para continuar
    </p>

    <!-- MENSAJES -->

    @if(status() === 0) {
    <div class="lg-alert lg-alert-danger">
      <i class="fa-solid fa-circle-exclamation"></i>
      Usuario o contraseña incorrecta
    </div>
    }

    @if(status() === 1) {
    <div class="lg-alert lg-alert-warning">
      <i class="fa-solid fa-triangle-exclamation"></i>
      Error del servidor
    </div>
    }
    <!-- FORMULARIO -->

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

      <div class="lg-field">

        <label class="lg-label">
          Correo electrónico
        </label>

        <div class="lg-input-wrap">
          <i class="fa-solid fa-envelope lg-input-icon"></i>

          <input
            type="email"
            name="email"
            class="lg-input"
            placeholder="correo@ejemplo.com"
            [(ngModel)]="user.email"
            required>

        </div>
      </div>

      <div class="lg-field">

        <label class="lg-label">
          Contraseña
        </label>

        <div class="lg-input-wrap">
          <i class="fa-solid fa-lock lg-input-icon"></i>

          <input
            type="password"
            name="password"
            class="lg-input"
            placeholder="••••••••"
            [(ngModel)]="user.password"
            required>

        </div>
      </div>

      <button type="submit" class="lg-btn">
        <i class="fa-solid fa-right-to-bracket me-1"></i>
        Ingresar
      </button>

    </form>

  </div>

</div>

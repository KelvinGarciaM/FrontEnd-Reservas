<div class="lg-wrapper">

  <div class="lg-card">

    <div class="lg-logo">
      <div class="lg-logo-icon">
        <i class="fa-solid fa-building"></i>
      </div>
      <span class="lg-logo-text">Hotel</span>
    </div>

    <h2 class="lg-title">Iniciar sesión</h2>
    <p class="lg-subtitle">Ingresa tus credenciales para continuar</p>

    @if(status() === 0) {
    <div class="lg-alert lg-alert-danger">
      <i class="fa-solid fa-circle-exclamation"></i>
      Usuario o contraseña incorrecta
    </div>
    }

    @if(status() === 1) {
    <div class="lg-alert lg-alert-warning">
      <i class="fa-solid fa-triangle-exclamation"></i>
      Error del servidor
    </div>
    }

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

      <div class="lg-field">
        <label class="lg-label">Correo electrónico</label>
        <div class="lg-input-wrap">
          <i class="fa-solid fa-envelope lg-input-icon"></i>
          <input type="email" name="email" class="lg-input"
                 placeholder="correo@ejemplo.com"
                 [(ngModel)]="user.email" required />
        </div>
      </div>

      <div class="lg-field">
        <label class="lg-label">Contraseña</label>
        <div class="lg-input-wrap">
          <i class="fa-solid fa-lock lg-input-icon"></i>
          <input type="password" name="password" class="lg-input"
                 placeholder="••••••••"
                 [(ngModel)]="user.password" required />
        </div>
      </div>

      <button type="submit" class="lg-btn">
        <i class="fa-solid fa-right-to-bracket me-1"></i>
        Ingresar
      </button>

    </form>

  </div>

</div>

<div class="app-page">

  <div class="app-page-header">
    <div>
      <h2 class="app-title">Usuarios</h2>
      <div class="app-breadcrumb">
        <span>Configuración</span>
        <i class="fa-solid fa-chevron-right"></i>
        <span class="app-breadcrumb-active">Usuarios</span>
      </div>
    </div>
    <button class="app-btn-primary" (click)="openCreate()">
      <i class="fa-solid fa-plus"></i> Nuevo Usuario
    </button>
  </div>

  @if(showForm) {
    <app-user-form
      [editingUser]="editingUser"
      (formClosed)="closeForm()"
      (userSaved)="onUserSaved()">
    </app-user-form>
  } @else {
    <app-user-table
      [users]="filteredUsers"
      (editUser)="openEdit($event)"
      (deleteUser)="onDelete($event)"
      (searchChanged)="onSearch($event)">
    </app-user-table>
  }

  

</div>

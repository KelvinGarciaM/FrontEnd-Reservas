<div class="app-card">
  <div class="app-card-header">
    <h3 class="app-card-title">
      <i class="fa-solid fa-users"></i> Lista de usuarios
    </h3>
    <div class="app-search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Buscar usuario..." [(ngModel)]="searchTerm" (input)="onSearch()" />
    </div>
  </div>

  <div class="app-table-wrapper">
    <table class="app-table">
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Correo</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        @for(u of _users; track u.id) {
        <tr>
          <td>
            <div class="app-user-cell">
              @if(u.image && imageMap[u.id!]) {
              <img [src]="imageMap[u.id!]" alt="avatar" />
              } @else {
              <div class="app-avatar-sm">{{ getInitials(u.name) }}</div>
              }
              <span>{{ u.name }}</span>
            </div>
          </td>
          <td>{{ u.email }}</td>
          <td>
            <span class="app-badge" [class.app-badge-admin]="u.role === 'Administrador'">
              {{ u.role }}
            </span>
          </td>
          <td>
            <span class="app-status" [class.app-status-active]="u.estado === 1"
              [class.app-status-inactive]="u.estado === 0">
              {{ u.estado === 1 ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td>
            <div class="app-actions">
              <button class="app-btn-action app-btn-edit" (click)="editUser.emit(u)" title="Editar"  [disabled]="u.estado === 0">
                <i class="fa-solid fa-pen"></i>
              </button>
            
              <button class="app-btn-action" (click)="deleteUser.emit(u.id!)" [disabled]="currentUser?.email === u.email">

                <i class="fa-solid" [class]="u.estado === 1 ? 'fa-user-slash' : 'fa-user-check'">
                </i>

              </button>
            </div>
          </td>
        </tr>
        } @empty {
        <tr>
          <td colspan="5" class="app-empty">No hay usuarios registrados.</td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
